<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FYP Project Hub</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #F0EEFF;
  --bg2: #E8E4FF;
  --surface: #ffffff;
  --surface2: #F7F5FF;
  --border: rgba(109,40,217,0.12);
  --border2: rgba(109,40,217,0.22);
  --text: #18181b;
  --text2: #52525b;
  --text3: #a1a1aa;
  --primary: #6d28d9;
  --primary-lt: #ede9fe;
  --green: #059669;
  --green-lt: #d1fae5;
  --red: #dc2626;
  --red-lt: #fee2e2;
  --amber: #d97706;
  --r: 20px;
  --r-sm: 12px;
  --shadow: 0 1px 2px rgba(0,0,0,0.04), 0 6px 20px rgba(109,40,217,0.07);
  --shadow-up: 0 2px 6px rgba(0,0,0,0.07), 0 16px 40px rgba(109,40,217,0.12);
}
body { font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; overflow-x:hidden; font-size:14px; }

/* TOP BAR */
header { position:sticky;top:0;z-index:50;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;padding:0 24px;height:58px;backdrop-filter:blur(8px); }
.logo { display:flex;align-items:center;gap:10px;text-decoration:none;flex-shrink:0; }
.logo img { width:34px;height:34px;border-radius:9px; }
.logo-name { font-size:15px;font-weight:700;color:var(--text); }
.hstats { display:flex;gap:16px;margin-left:16px; }
.hstat { display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2);white-space:nowrap; }
.hstat .dot { width:7px;height:7px;border-radius:50%;background:var(--text3);transition:background .3s; }
.dot-live { background:#10b981!important; }
.spacer { flex:1; }
.hbtn { display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:99px;border:1px solid var(--border2);background:var(--surface2);font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .15s;white-space:nowrap; }
.hbtn:hover { background:var(--primary-lt);color:var(--primary);border-color:rgba(109,40,217,.35); }
.hbtn-red { background:rgba(220,38,38,.07);color:var(--red);border-color:rgba(220,38,38,.2); }
.hbtn-red:hover { background:rgba(220,38,38,.14);border-color:rgba(220,38,38,.4); }

/* FILTER BAR */
.fbar { padding:16px 24px 0;display:flex;align-items:center;gap:8px;flex-wrap:wrap; }
.ftab { display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:99px;border:none;background:var(--surface);color:var(--text2);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;box-shadow:0 1px 4px rgba(0,0,0,.06); }
.ftab:hover { color:var(--primary); }
.ftab.on { background:var(--primary);color:#fff;box-shadow:0 2px 10px rgba(109,40,217,.35); }
.ftab .cnt { font-size:11px;font-weight:600;background:rgba(0,0,0,.08);border-radius:99px;padding:1px 7px; }
.ftab.on .cnt { background:rgba(255,255,255,.25); }
.srch { margin-left:auto;position:relative; }
.srch input { padding:6px 12px 6px 32px;border-radius:99px;border:1px solid var(--border2);background:var(--surface);font-size:13px;color:var(--text);outline:none;width:180px;transition:all .2s;box-shadow:0 1px 3px rgba(0,0,0,.05); }
.srch input:focus { width:220px;border-color:var(--primary);box-shadow:0 0 0 3px rgba(109,40,217,.12); }
.srch input::placeholder { color:var(--text3); }
.srch svg { position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none; }

/* GRID */
.wrap { padding:18px 24px 48px; }
.sec-lbl { font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin:16px 0 10px; }
.grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:14px; }

/* CARD */
.card { background:var(--surface);border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--shadow);display:flex;flex-direction:column;overflow:hidden;transition:box-shadow .2s,transform .2s;animation:fu .25s ease both;cursor:pointer; }
.card:hover { box-shadow:var(--shadow-up);transform:translateY(-2px); }
.card.live { border-color:rgba(5,150,105,.3);box-shadow:var(--shadow),0 0 0 1px rgba(5,150,105,.15); }
@keyframes fu { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }
.card-selected { outline:2.5px solid var(--primary);outline-offset:2px; }

.ctop { padding:16px 16px 12px;display:flex;align-items:flex-start;gap:12px; }
.clogo { width:52px;height:52px;border-radius:14px;overflow:hidden;flex-shrink:0;background:var(--surface2); }
.clogo img { width:100%;height:100%;display:block; }
.cinfo { flex:1;min-width:0; }
.cname { font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
.cdesc { font-size:12px;color:var(--text2);margin-top:3px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden; }

.ctech { padding:0 16px 12px;display:flex;flex-wrap:wrap;gap:5px; }
.chip { font-size:11px;font-weight:500;padding:2px 9px;border-radius:99px;background:var(--surface2);color:var(--text2);border:1px solid var(--border); }

.cstatus { margin:0 16px 12px;display:flex;align-items:center;gap:8px;font-size:12px;font-weight:500; }
.sdot { width:8px;height:8px;border-radius:50%;background:var(--text3);flex-shrink:0;transition:background .3s; }
.live .sdot { background:#10b981;box-shadow:0 0 0 3px rgba(16,185,129,.18);animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{box-shadow:0 0 0 3px rgba(16,185,129,.18)} 50%{box-shadow:0 0 0 6px rgba(16,185,129,.05)} }
.slbl { color:var(--text2); }
.live .slbl { color:var(--green); }
.sopen { margin-left:auto;font-size:11px;font-weight:500;color:var(--green);padding:2px 8px;border-radius:99px;background:rgba(5,150,105,.1);text-decoration:none;transition:background .15s; }
.sopen:hover { background:rgba(5,150,105,.18); }

.cact { padding:0 12px 12px; }
.btn { width:100%;padding:11px;border-radius:12px;border:none;color:#fff;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:7px;letter-spacing:.01em; }
.btn-run { background:linear-gradient(135deg,#059669,#10b981);box-shadow:0 2px 8px rgba(5,150,105,.3); }
.btn-run:hover { filter:brightness(1.07);box-shadow:0 4px 14px rgba(5,150,105,.4);transform:translateY(-1px); }
.btn-stop { background:linear-gradient(135deg,#dc2626,#ef4444);box-shadow:0 2px 8px rgba(220,38,38,.3); }
.btn-stop:hover { filter:brightness(1.07);box-shadow:0 4px 14px rgba(220,38,38,.4);transform:translateY(-1px); }
.btn-open { background:linear-gradient(135deg,#6d28d9,#7c3aed);box-shadow:0 2px 8px rgba(109,40,217,.3); }
.btn-open:hover { filter:brightness(1.07);box-shadow:0 4px 14px rgba(109,40,217,.4);transform:translateY(-1px); }
.btn-muted { background:var(--surface2);color:var(--text2);border:1px solid var(--border2);box-shadow:none; }
.btn-muted:hover { background:var(--primary-lt);color:var(--primary);transform:none;filter:none;box-shadow:none; }
.btn-loading { background:var(--green-lt);color:var(--green);cursor:wait;box-shadow:none; }
.btn-loading:hover { filter:none;box-shadow:none;transform:none; }
.btn:active { transform:scale(.98)!important; }

.cfoot { display:flex;align-items:center;justify-content:space-between;padding:10px 16px 14px;border-top:1px solid var(--border); }
.fsize { font-size:11px;color:var(--text3); }
.fgh { font-size:11px;color:var(--text3);text-decoration:none;display:flex;align-items:center;gap:3px;transition:color .15s; }
.fgh:hover { color:var(--primary); }
.fnote { font-size:11px;color:var(--amber); }

/* SPINNER */
.spin { width:14px;height:14px;border:2px solid rgba(0,0,0,.15);border-top-color:currentColor;border-radius:50%;animation:sp .6s linear infinite;flex-shrink:0; }
@keyframes sp { to{transform:rotate(360deg)} }

/* TOAST */
#toast { position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#18181b;color:#fff;padding:10px 20px;border-radius:99px;font-size:13px;font-weight:500;z-index:200;transition:transform .3s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.25); }
#toast.show { transform:translateX(-50%) translateY(0); }
#toast.ok { background:var(--green); }
#toast.err { background:var(--red); }

/* AI PANEL */
#panel { position:fixed;right:0;top:0;bottom:0;width:380px;background:var(--surface);border-left:1px solid var(--border);z-index:100;transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;box-shadow:-8px 0 40px rgba(0,0,0,.09); }
#panel.open { transform:translateX(0); }
.ph { display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid var(--border); }
.ph-title { font-size:15px;font-weight:600; }
.ph-close { width:30px;height:30px;border-radius:8px;border:1px solid var(--border2);background:var(--surface2);cursor:pointer;font-size:16px;color:var(--text2);display:flex;align-items:center;justify-content:center;transition:all .15s; }
.ph-close:hover { background:var(--primary-lt);color:var(--primary); }
.pb { flex:1;overflow-y:auto;padding:18px; }
.ai-row { display:flex;gap:8px;margin-bottom:14px; }
.ai-row input { flex:1;padding:8px 12px;border-radius:var(--r-sm);border:1px solid var(--border2);background:var(--surface2);font-size:12px;font-family:monospace;outline:none;color:var(--text); }
.ai-row input:focus { border-color:var(--primary);box-shadow:0 0 0 3px rgba(109,40,217,.12); }
.ai-save { padding:8px 14px;border-radius:var(--r-sm);background:var(--primary);color:#fff;border:none;font-size:12px;font-weight:600;cursor:pointer; }
.ai-go { width:100%;padding:10px;border-radius:var(--r-sm);background:linear-gradient(135deg,#6d28d9,#7c3aed);color:#fff;border:none;font-size:13px;font-weight:600;cursor:pointer;margin-bottom:16px;box-shadow:0 2px 8px rgba(109,40,217,.3); }
.ai-go:hover { filter:brightness(1.07); }
.ai-out { font-size:13px;line-height:1.8;color:var(--text); }
.ai-out h4 { font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--primary);margin:14px 0 6px; }
.ai-out ul { padding-left:16px; }
.ai-out li { margin-bottom:4px; }
.ai-ph { color:var(--text3);font-size:13px;text-align:center;margin-top:40px;line-height:1.7; }
.ai-ph .ico { font-size:32px;margin-bottom:8px; }

/* OVERLAY */
#ov { position:fixed;inset:0;background:rgba(0,0,0,0);z-index:90;pointer-events:none;transition:background .3s; }
#ov.on { background:rgba(0,0,0,.2);pointer-events:all; }

/* EMPTY */
.empty { text-align:center;padding:60px 20px;color:var(--text3); }
.empty-ico { font-size:40px;margin-bottom:10px; }
</style>
</head>
<body>

<header>
  <a class="logo" href="#" onclick="return false">
    <img src="/logos/project-organiser.svg" alt="FYP Project Hub">
    <span class="logo-name">FYP Project Hub</span>
  </a>
  <div class="hstats">
    <div class="hstat"><div class="dot" id="live-dot"></div><span id="live-n">0 running</span></div>
    <div class="hstat"><div class="dot"></div><span id="total-n">— projects</span></div>
  </div>
  <div class="spacer"></div>
  <button class="hbtn" onclick="openPanel()">✨ AI Analysis</button>
  <button class="hbtn hbtn-red" onclick="stopServer()">⏻ Stop</button>
</header>

<div class="fbar">
  <button class="ftab on" data-f="all"   onclick="setF('all')">All <span class="cnt" id="c-all">—</span></button>
  <button class="ftab" data-f="running"  onclick="setF('running')">● Running <span class="cnt" id="c-run">0</span></button>
  <button class="ftab" data-f="web"      onclick="setF('web')">Web <span class="cnt" id="c-web">—</span></button>
  <button class="ftab" data-f="mobile"   onclick="setF('mobile')">Mobile <span class="cnt" id="c-mob">—</span></button>
  <button class="ftab" data-f="tools"    onclick="setF('tools')">Tools <span class="cnt" id="c-tool">—</span></button>
  <div class="srch">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input id="sq" type="text" placeholder="Search…" oninput="render()">
  </div>
</div>

<div class="wrap" id="wrap"></div>

<div id="toast"></div>
<div id="ov" onclick="closePanel()"></div>

<div id="panel">
  <div class="ph">
    <div class="ph-title" id="ptitle">✨ AI Analysis</div>
    <button class="ph-close" onclick="closePanel()">✕</button>
  </div>
  <div class="pb">
    <div class="ai-row">
      <input type="password" id="akey" placeholder="sk-ant-… Claude API key">
      <button class="ai-save" onclick="saveKey()">Save</button>
    </div>
    <button class="ai-go" id="ago" onclick="analyse()">Analyse selected project</button>
    <div id="aout"><div class="ai-ph"><div class="ico">✨</div>Click a project card, then hit Analyse to get AI insights on overview, limitations and next steps.</div></div>
  </div>
</div>

<script>
let projects = [], status = {}, filter = 'all', sel = null;
let apiKey = localStorage.getItem('fyp_key') || '';
if (apiKey) document.getElementById('akey').value = apiKey;

document.getElementById('wrap').innerHTML = '<div class="empty"><div class="empty-ico">⏳</div><p>Loading…</p></div>';

async function poll() {
  const ctrl = new AbortController();
  const t = setTimeout(() => ctrl.abort(), 5000);
  try {
    const r = await fetch('/api/status', { signal: ctrl.signal });
    clearTimeout(t);
    const d = await r.json();
    projects = d.projects || [];
    status = d.running || {};
    render();
    updateBar();
  } catch(e) {
    clearTimeout(t);
    if (!projects.length) document.getElementById('wrap').innerHTML = '<div class="empty"><div class="empty-ico">⚠️</div><p>Cannot reach server.<br>Open via <strong>start.bat</strong></p></div>';
  }
}

function updateBar() {
  const n = Object.keys(status).length;
  document.getElementById('live-n').textContent = n + ' running';
  document.getElementById('total-n').textContent = projects.length + ' projects';
  document.getElementById('live-dot').className = 'dot' + (n > 0 ? ' dot-live' : '');
  const cats = { web:0, mobile:0, tools:0 };
  projects.forEach(p => { if (cats[p.category] !== undefined) cats[p.category]++; });
  document.getElementById('c-all').textContent = projects.length;
  document.getElementById('c-run').textContent = n;
  document.getElementById('c-web').textContent = cats.web;
  document.getElementById('c-mob').textContent = cats.mobile;
  document.getElementById('c-tool').textContent = cats.tools;
}

function setF(f) {
  filter = f;
  document.querySelectorAll('.ftab').forEach(b => b.classList.toggle('on', b.dataset.f === f));
  render();
}

function visible() {
  const q = document.getElementById('sq').value.toLowerCase();
  return projects.filter(p => {
    if (filter === 'running' && !status[p.id]) return false;
    if (!['all','running'].includes(filter) && p.category !== filter) return false;
    if (q && !p.name.toLowerCase().includes(q) && !p.tech.join(' ').toLowerCase().includes(q)) return false;
    return true;
  });
}

function render() {
  const list = visible();
  const wrap = document.getElementById('wrap');
  if (!list.length) { wrap.innerHTML = '<div class="empty"><div class="empty-ico">🔍</div><p>Nothing matches</p></div>'; return; }
  const order = ['web','mobile','tools'];
  const labels = { web:'Web & Apps', mobile:'Mobile', tools:'Tools & Scripts' };
  const g = {};
  list.forEach(p => { (g[p.category] = g[p.category] || []).push(p); });
  wrap.innerHTML = order.filter(c => g[c]).map(c =>
    `<div class="sec-lbl">${labels[c]}</div><div class="grid">${g[c].map(cardHTML).join('')}</div>`
  ).join('');
}

function cardHTML(p) {
  const live = !!status[p.id];
  const lc = live ? ' live' : '';
  const sc = sel === p.id ? ' card-selected' : '';
  const ptype = p.type || '';

  const statusBlock = `<div class="cstatus"><div class="sdot"></div><span class="slbl">${live ? 'Running' : 'Stopped'}</span>${live && p.url ? `<a class="sopen" href="${p.url}" target="_blank">Open ↗</a>` : ''}</div>`;

  let btn = '';
  if (live) {
    btn = `<button class="btn btn-stop" id="b-${p.id}" onclick="doStop('${p.id}',event)">⏹ Stop</button>`;
  } else if (ptype === 'static') {
    btn = `<button class="btn btn-open" id="b-${p.id}" onclick="doOpen('${p.id}',event)">↗ Open in browser</button>`;
  } else if (ptype === 'cloudflare') {
    btn = `<button class="btn btn-muted" id="b-${p.id}">☁ wrangler deploy</button>`;
  } else if (p.category === 'mobile' && p.note) {
    btn = `<button class="btn btn-muted" id="b-${p.id}" title="${p.note}">📱 Needs emulator</button>`;
  } else {
    btn = `<button class="btn btn-run" id="b-${p.id}" onclick="doRun('${p.id}',event)">▶ Run</button>`;
  }

  const gh = p.github
    ? `<a class="fgh" href="${p.github}" target="_blank">GitHub ↗</a>`
    : `<span class="fnote">No GitHub</span>`;

  return `<div class="card${lc}${sc}" id="card-${p.id}" onclick="selectCard('${p.id}')">
  <div class="ctop">
    <div class="clogo"><img src="/logos/${p.id}.svg" alt="${p.name}" onerror="this.parentElement.innerHTML='<span style=font-size:28px;line-height:52px;text-align:center;display:block>${p.icon}</span>'"></div>
    <div class="cinfo"><div class="cname">${p.name}</div><div class="cdesc">${p.desc}</div></div>
  </div>
  <div class="ctech">${p.tech.map(t => `<span class="chip">${t}</span>`).join('')}</div>
  ${statusBlock}
  <div class="cact">${btn}</div>
  <div class="cfoot"><span class="fsize">${p.size}</span>${gh}</div>
</div>`;
}

function selectCard(id) {
  sel = id;
  render();
  const p = projects.find(x => x.id === id);
  if (p) document.getElementById('ptitle').textContent = '✨ ' + p.name;
}

async function doRun(id, e) {
  e && e.stopPropagation();
  setBtn(id, 'loading', '<div class="spin"></div> Starting…');
  const d = await call(`/api/start/${id}`, 'POST');
  if (d?.ok) {
    if (!d.static) { status[id] = 'running'; toast('Started! Opening in browser soon…', 'ok'); }
    else toast('Opened in browser ✓', 'ok');
  } else toast(d?.error || 'Failed to start', 'err');
  await poll();
}

async function doStop(id, e) {
  e && e.stopPropagation();
  setBtn(id, 'loading', '<div class="spin"></div> Stopping…');
  const d = await call(`/api/stop/${id}`, 'POST');
  if (d?.ok) { delete status[id]; toast('Stopped ✓', 'ok'); }
  else toast(d?.error || 'Failed', 'err');
  await poll();
}

async function doOpen(id, e) {
  e && e.stopPropagation();
  await call(`/api/start/${id}`, 'POST');
  toast('Opening…', 'ok');
}

function setBtn(id, cls, html) {
  const b = document.getElementById(`b-${id}`);
  if (b) { b.className = `btn btn-${cls}`; b.innerHTML = html; b.disabled = true; }
}

async function call(url, method) {
  try { return await (await fetch(url, { method })).json(); } catch { return null; }
}

async function stopServer() {
  if (!confirm('Stop the Project Hub server?')) return;
  await call('/api/shutdown', 'POST');
  toast('Server stopped', 'ok');
}

function openPanel() { document.getElementById('panel').classList.add('open'); document.getElementById('ov').classList.add('on'); }
function closePanel() { document.getElementById('panel').classList.remove('open'); document.getElementById('ov').classList.remove('on'); }

function saveKey() {
  apiKey = document.getElementById('akey').value.trim();
  localStorage.setItem('fyp_key', apiKey);
  toast('API key saved ✓', 'ok');
}

async function analyse() {
  if (!apiKey) { toast('Enter your Claude API key first', 'err'); return; }
  const p = sel ? projects.find(x => x.id === sel) : null;
  if (!p) { toast('Click a project card first', 'err'); return; }
  const btn = document.getElementById('ago');
  btn.textContent = 'Analysing…';
  btn.disabled = true;
  document.getElementById('aout').innerHTML = '<div class="ai-ph"><div class="spin" style="margin:auto;width:24px;height:24px;border-width:3px"></div></div>';
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true' },
      body: JSON.stringify({ model:'claude-haiku-4-5-20251001', max_tokens:700, messages:[{ role:'user', content:`Senior dev reviewing "${p.name}". Tech: ${p.tech.join(', ')}. ${p.desc}\n\nGive:\n## Overview\n2–3 sentence technical summary.\n## Limitations\n3 real risks/gaps.\n## What's Next\n3 high-impact steps.\n## Quick Win\nOne thing under 1 hour. Be direct, no filler.` }] })
    });
    if (!res.ok) throw new Error((await res.json()).error?.message || 'API error');
    const txt = (await res.json()).content[0].text;
    document.getElementById('aout').innerHTML = `<div class="ai-out">${txt.replace(/## (.+)/g,'<h4>$1</h4>').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/^[-•] (.+)/gm,'<li>$1</li>').replace(/^\d+\. (.+)/gm,'<li>$1</li>').replace(/(<li>[^<]*<\/li>\n?)+/g,m=>`<ul>${m}</ul>`).replace(/\n\n/g,'<br>')}</div>`;
  } catch(e) {
    document.getElementById('aout').innerHTML = `<div class="ai-ph" style="color:var(--red)">${e.message}</div>`;
  }
  btn.textContent = 'Analyse selected project';
  btn.disabled = false;
}

let _tt;
function toast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = type ? `show ${type}` : 'show';
  clearTimeout(_tt);
  _tt = setTimeout(() => t.className = '', 3000);
}

poll();
setInterval(poll, 2500);
</script>
</body>
</html>
